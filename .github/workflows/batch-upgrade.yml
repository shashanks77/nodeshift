name: Node.js Batch Upgrade

on:
  # Run every Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Node.js version'
        default: '24'
      dry_run:
        description: 'Dry run (no PRs created)'
        type: boolean
        default: false
      llm_enabled:
        description: 'Enable LLM-assisted fixes during upgrade'
        type: boolean
        default: true
      llm_model:
        description: 'Ollama model to use for LLM fixes'
        default: 'qwen2.5-coder:7b'

jobs:
  batch-upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout nodeshift
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build nodeshift binary
        run: go build -o bin/nodeshift ./cmd/cli

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install codemod engine
        run: |
          cd codemod-engine
          npm ci
          npx tsc

      - name: Configure git identity
        run: |
          git config --global user.name "nodeshift[bot]"
          git config --global user.email "nodeshift-bot@users.noreply.github.com"

      - name: Cache Ollama model
        if: ${{ github.event.inputs.llm_enabled != 'false' }}
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ github.event.inputs.llm_model || 'qwen2.5-coder:7b' }}

      - name: Install and start Ollama
        if: ${{ github.event.inputs.llm_enabled != 'false' }}
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          MODEL="${{ github.event.inputs.llm_model || 'qwen2.5-coder:7b' }}"
          ollama serve &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready"
              break
            fi
            sleep 1
          done
          ollama pull "$MODEL"

      - name: Run batch upgrade
        env:
          GITHUB_TOKEN: ${{ secrets.NODESHIFT_PAT }}
        run: |
          TARGET="${{ github.event.inputs.target || '24' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          LLM_ENABLED="${{ github.event.inputs.llm_enabled || 'true' }}"
          MODEL="${{ github.event.inputs.llm_model || 'qwen2.5-coder:7b' }}"

          ARGS="batch --file repos.json --target $TARGET --codemods --engine-dir ./codemod-engine"

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ "$LLM_ENABLED" = "true" ]; then
            ARGS="$ARGS --llm-url http://localhost:11434 --llm-model $MODEL"
          fi

          ./bin/nodeshift $ARGS
