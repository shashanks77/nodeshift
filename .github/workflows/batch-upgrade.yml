name: Node.js Batch Upgrade

on:
  # Run every Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Node.js version'
        default: '24'
      dry_run:
        description: 'Dry run (no PRs created)'
        type: boolean
        default: false

jobs:
  # Read repos.json and create a matrix entry per repo
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout nodeshift
        uses: actions/checkout@v4

      - name: Build repo matrix
        id: set-matrix
        run: |
          MATRIX=$(python3 -c "
          import json
          with open('repos.json') as f:
              repos = json.load(f)
          repos = [r for r in repos if not r.get('disabled', False)]
          for r in repos:
              parts = r['url'].replace('.git','').split('/')
              r['name'] = f\"{parts[-2]}/{parts[-1]}\"
          print(json.dumps({'include': repos}))
          ")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # Each repo runs as a separate parallel job
  upgrade:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    name: "upgrade: ${{ matrix.name }}"

    steps:
      - name: Checkout nodeshift
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build nodeshift binary
        run: go build -o bin/nodeshift ./cmd/cli

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install codemod engine
        run: |
          cd codemod-engine
          npm ci
          npx tsc

      - name: Configure git identity
        run: |
          git config --global user.name "nodeshift[bot]"
          git config --global user.email "nodeshift-bot@users.noreply.github.com"

      - name: "Upgrade ${{ matrix.name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.NODESHIFT_PAT }}
        run: |
          TARGET="${{ github.event.inputs.target || '24' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS="upgrade ${{ matrix.url }} --target $TARGET --base ${{ matrix.baseBranch }} --codemods --engine-dir ./codemod-engine"

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          ./bin/nodeshift $ARGS
