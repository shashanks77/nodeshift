name: LLM Fix (Post-Upgrade)

on:
  # Triggered after batch-upgrade completes
  workflow_run:
    workflows: ["Node.js Batch Upgrade"]
    types: [completed]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Node.js version'
        default: '24'
      llm_model:
        description: 'Ollama model to use'
        default: 'qwen2.5-coder:7b'

jobs:
  llm-fix:
    runs-on: ubuntu-latest
    # Only run if batch-upgrade succeeded (or manual dispatch)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 60

    steps:
      - name: Checkout nodeshift
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build nodeshift binary
        run: go build -o bin/nodeshift ./cmd/cli

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull model
        run: |
          MODEL="${{ github.event.inputs.llm_model || 'qwen2.5-coder:7b' }}"
          
          # Start Ollama in background
          ollama serve &
          
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready"
              break
            fi
            sleep 1
          done
          
          # Pull the model
          echo "Pulling model: $MODEL"
          ollama pull "$MODEL"

      - name: Configure git identity
        run: |
          git config --global user.name "nodeshift[bot]"
          git config --global user.email "nodeshift-bot@users.noreply.github.com"

      - name: Run LLM fix
        env:
          GITHUB_TOKEN: ${{ secrets.NODESHIFT_PAT }}
        run: |
          TARGET="${{ github.event.inputs.target || '24' }}"
          MODEL="${{ github.event.inputs.llm_model || 'qwen2.5-coder:7b' }}"
          
          ./bin/nodeshift fix \
            --target "$TARGET" \
            --llm-url http://localhost:11434 \
            --llm-model "$MODEL" \
            --file repos.json
